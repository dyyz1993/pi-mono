<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RpcClient Architecture Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

:root {
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2235;--bg-hover:#1e293b;
  --border:#2a3550;--border-light:#374766;
  --text:#e2e8f0;--text-dim:#8892a8;--text-bright:#f8fafc;
  --accent:#38bdf8;--accent2:#818cf8;--accent3:#a78bfa;
  --green:#34d399;--yellow:#fbbf24;--orange:#fb923c;
  --red:#f87171;--pink:#f472b6;--cyan:#22d3ee;--teal:#2dd4bf;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;overflow:hidden}

#app{width:100%;height:100%;display:flex}

/* ─── Sidebar ─── */
#sidebar{width:280px;min-width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:10}
#sidebar-header{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
#sidebar-header h1{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-.5px}
#sidebar-header p{font-size:11px;color:var(--text-dim);margin-top:4px}
#search-box{margin:12px 16px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:12px;outline:none;width:calc(100% - 32px);transition:border-color .2s}
#search-box:focus{border-color:var(--accent)}
#search-box::placeholder{color:var(--text-dim)}
#nav-list{flex:1;overflow-y:auto;padding:8px 0}
#nav-list::-webkit-scrollbar{width:4px}
#nav-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav-group-label{padding:10px 16px 4px;font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.nav-item{padding:7px 16px 7px 24px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:12px;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg-hover)}
.nav-item.active{background:var(--bg3);border-left-color:var(--accent)}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-label{flex:1}
.nav-count{font-size:10px;color:var(--text-dim);background:var(--bg);padding:1px 6px;border-radius:3px}
#sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--text-dim);display:flex;gap:16px}
#sidebar-footer span{color:var(--accent);font-weight:600}

/* ─── Main ─── */
#main{flex:1;overflow-y:auto;position:relative}
#main::-webkit-scrollbar{width:6px}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ─── Tabs ─── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:5}
.tab-btn{padding:14px 24px;font-family:inherit;font-size:13px;font-weight:500;color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab-btn:hover{color:var(--text);background:var(--bg-hover)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none;padding:40px 48px 80px}
.tab-panel.active{display:block}

/* ─── Overview ─── */
.overview-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--text-bright);margin-bottom:6px}
.overview-sub{font-size:13px;color:var(--text-dim);margin-bottom:24px}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;cursor:pointer;transition:all .2s}
.stat-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(56,189,248,.1)}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:2px}
.ascii-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:20px 24px;font-size:10.5px;line-height:1.55;color:var(--text-dim);white-space:pre;overflow-x:auto;margin-bottom:24px}

/* ─── Detail Sections ─── */
.detail-section{margin-bottom:32px;scroll-margin-top:60px}
.detail-section.hidden{display:none}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.section-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:var(--text-bright)}
.section-desc{font-size:11px;color:var(--text-dim)}

/* ─── API Cards ─── */
.api-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.api-card:hover{border-color:var(--border-light)}
.api-card-header{padding:12px 16px;display:flex;align-items:baseline;gap:8px;cursor:pointer;user-select:none}
.api-card-header:hover{background:var(--bg3)}
.api-method{font-size:13px;font-weight:600;color:var(--green);flex-shrink:0}
.api-params{font-size:12px;color:var(--text-dim)}
.api-return{font-size:11px;color:var(--yellow);margin-left:auto;flex-shrink:0;background:var(--bg);padding:2px 8px;border-radius:4px}
.api-card-body{padding:0 16px 14px;display:none}
.api-card.open .api-card-body{display:block}
.api-desc{font-size:12px;color:var(--text-dim);margin-bottom:10px;line-height:1.5}
.type-table{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0}
.type-table th{text-align:left;padding:6px 10px;background:var(--bg);color:var(--text-dim);font-weight:500;border-bottom:1px solid var(--border)}
.type-table td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.type-table tr:last-child td{border-bottom:none}
.fn{color:var(--accent);font-weight:500}
.ft{color:var(--accent2)}
.fd{color:var(--text-dim)}
.en{color:var(--orange);font-weight:600;white-space:nowrap}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500}
.tag-async{background:rgba(52,211,153,.15);color:var(--green)}
.tag-sub{background:rgba(244,114,182,.15);color:var(--pink)}
.tag-ff{background:rgba(251,191,36,.15);color:var(--yellow)}
.tag-rr{background:rgba(129,140,248,.15);color:var(--accent2)}
.conn-box{background:var(--bg3);border:1px dashed var(--border-light);border-radius:8px;padding:14px 18px;margin-top:12px}
.conn-title{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:6px}
.conn-text{font-size:11px;color:var(--text-dim);line-height:1.6}
.flow-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin:10px 0;font-size:11px;line-height:1.7;white-space:pre;overflow-x:auto}
.intro-box{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:11px;color:var(--yellow);line-height:1.5}

/* ─── Lifecycle Diagrams ─── */
.lc-diagram{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:24px 28px;margin:16px 0;overflow-x:auto}
.lc-flow{display:flex;align-items:stretch;gap:0;min-width:max-content;padding:8px 0}
.lc-node{min-width:120px;padding:12px 16px;border-radius:8px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:4px;flex-shrink:0;border:2px solid transparent;transition:all .2s;cursor:default;position:relative}
.lc-node:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.lc-node-idle{background:#0f2918;border-color:#1a5c2e;color:var(--green)}
.lc-node-streaming{background:#1a1535;border-color:#3b2d6b;color:var(--accent2)}
.lc-node-compacting{background:#0f2528;border-color:#1a5c5e;color:var(--teal)}
.lc-node-retrying{background:#2a1215;border-color:#6b2025;color:var(--red)}
.lc-node-done{background:#0a1a25;border-color:#1a4a6b;color:var(--accent)}
.lc-node-event{background:#1a1800;border-color:#5c521a;color:var(--yellow)}
.lc-node-ext{background:#1a0f25;border-color:#5c2d6b;color:var(--pink)}
.lc-title{font-size:12px;font-weight:700}
.lc-sub{font-size:9.5px;opacity:.7}
.lc-arrow{display:flex;align-items:center;flex-shrink:0;padding:0 4px;color:var(--text-dim);font-size:18px;position:relative}
.lc-arrow-label{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;white-space:nowrap;color:var(--text-dim);background:var(--bg);padding:0 4px}
.lc-arrow-label-bottom{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:9px;white-space:nowrap;color:var(--text-dim);background:var(--bg);padding:0 4px}
.lc-branch{display:flex;flex-direction:column;gap:0;position:relative}

/* ─── State Machine ─── */
.sm-grid{display:grid;gap:16px;margin:16px 0}
.sm-row{display:flex;gap:16px;flex-wrap:wrap}
.sm-state{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.sm-state-title{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.sm-state-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sm-state-body{font-size:11px;color:var(--text-dim);line-height:1.5}
.sm-state-body code{color:var(--green);font-size:10px}
.sm-trans{font-size:10px;color:var(--accent);margin-top:6px;display:flex;align-items:center;gap:4px}
.sm-trans::before{content:"→";color:var(--text-dim)}

/* ─── Use Cases ─── */
.uc-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:20px 0;overflow:hidden}
.uc-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.uc-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.uc-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--text-bright)}
.uc-body{padding:16px 20px}
.uc-step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.uc-step:last-child{margin-bottom:0}
.uc-step-num{width:22px;height:22px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--accent);flex-shrink:0;border:1px solid var(--border)}
.uc-step-content{flex:1}
.uc-step-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.uc-step-desc{font-size:11px;color:var(--text-dim);line-height:1.4}
.uc-code{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:11px;line-height:1.5;margin-top:6px;color:var(--green);overflow-x:auto}
.uc-code .cm{color:var(--text-dim)}
.uc-code .st{color:var(--yellow)}
.uc-code .kw{color:var(--pink)}

@media(max-width:900px){
  #sidebar{display:none}
  .tab-panel{padding-left:24px;padding-right:24px}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>RpcClient</h1>
      <p>Architecture & Lifecycle Reference</p>
    </div>
    <input type="text" id="search-box" placeholder="Search methods, types, events..." />
    <div id="nav-list"></div>
    <div id="sidebar-footer">
      <div><span>19</span> dims</div>
      <div><span>60+</span> APIs</div>
      <div><span>6</span> lifecycles</div>
    </div>
  </div>
  <div id="main">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="api">API Reference</button>
      <button class="tab-btn" data-tab="lifecycle">Lifecycles</button>
      <button class="tab-btn" data-tab="usecases">Use Cases</button>
    </div>

    <!-- ═══════════════════════ TAB 1: API ═══════════════════════ -->
    <div class="tab-panel active" id="tab-api">
      <div style="padding:40px 0 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--bg2),var(--bg))">
        <div style="padding:0 48px">
          <div class="overview-title">RpcClient Architecture Map</div>
          <div class="overview-sub">Complete interactive reference — 19 dimensions, all methods, types, events, and connections</div>
          <div class="overview-grid" id="overview-grid"></div>
        </div>
      </div>
      <div style="padding:24px 48px 80px" id="api-sections"></div>
    </div>

    <!-- ═══════════════════════ TAB 2: LIFECYCLES ═══════════════════════ -->
    <div class="tab-panel" id="tab-lifecycle">
      <div style="padding:40px 48px 80px" id="lifecycle-content"></div>
    </div>

    <!-- ═══════════════════════ TAB 3: USE CASES ═══════════════════════ -->
    <div class="tab-panel" id="tab-usecases">
      <div style="padding:40px 48px 80px" id="usecases-content"></div>
    </div>
  </div>
</div>

<script>
// ┌─────────────────────────────────────────────┐
// │  DATA                                       │
// └─────────────────────────────────────────────┘
const SECTIONS = [
  { id:'lifecycle',icon:'⚡',title:'Lifecycle',color:'var(--accent)',desc:'Start / stop / options',stats:{v:3,l:'methods'},apis:[
    {m:'start()',p:'',r:'Promise<void>',d:'Spawn agent in RPC mode as child process'},
    {m:'stop()',p:'',r:'Promise<void>',d:'Stop agent (SIGTERM → SIGKILL)'},
    {m:'getStderr()',p:'',r:'string',d:'Collected stderr for debugging'}
  ],opts:{t:'RpcClientOptions',f:[{n:'cliPath',t:'string?',d:'CLI entry path'},{n:'cwd',t:'string?',d:'Working directory'},{n:'env',t:'Record<string,string>?',d:'Extra env vars'},{n:'provider',t:'string?',d:'LLM provider'},{n:'model',t:'string?',d:'Model ID'},{n:'args',t:'string[]?',d:'Extra CLI args'}]}},
  { id:'prompting',icon:'💬',title:'Prompting',color:'var(--green)',desc:'Send prompts, steer, follow-up',stats:{v:7,l:'methods'},apis:[
    {m:'prompt',p:'(message, images?)',r:'Promise<void>',d:'Send prompt, returns immediately',tags:['async']},
    {m:'steer',p:'(message, images?)',r:'Promise<void>',d:'Interrupt agent mid-run with steering',tags:['async']},
    {m:'followUp',p:'(message, images?)',r:'Promise<void>',d:'Queue message for after current run',tags:['async']},
    {m:'abort',p:'()',r:'Promise<void>',d:'Abort current operation',tags:['async']},
    {m:'waitForIdle',p:'(timeout=60000)',r:'Promise<void>',d:'Wait for agent_end event',tags:['helper']},
    {m:'collectEvents',p:'(timeout=60000)',r:'Promise<AgentEvent[]>',d:'Collect all events until idle',tags:['helper']},
    {m:'promptAndWait',p:'(message, images?, timeout?)',r:'Promise<AgentEvent[]>',d:'prompt + collectEvents combo',tags:['helper']}
  ],conn:{t:'Flow',x:'prompt() → onEvent() event stream → agent_start → turn_start → message_start/update/end → tool_execution_* → turn_end → agent_end. Use waitForIdle() to sync.'}},
  { id:'events',icon:'📡',title:'Event Subscription',color:'var(--yellow)',desc:'onEvent() streaming events',stats:{v:11,l:'event types'},apis:[
    {m:'onEvent',p:'(listener)',r:'() => void',d:'Subscribe to agent event stream',tags:['sub']}
  ],events:[
    {n:'agent_start',c:'Lifecycle',cc:'var(--accent)',f:'(none)',d:'Agent begins processing'},
    {n:'agent_end',c:'Lifecycle',cc:'var(--accent)',f:'messages: AgentMessage[]',d:'Agent finishes'},
    {n:'turn_start',c:'Turn',cc:'var(--accent2)',f:'(none)',d:'Turn begins (1 assistant + tools)'},
    {n:'turn_end',c:'Turn',cc:'var(--accent2)',f:'message, toolResults[]',d:'Turn completes'},
    {n:'message_start',c:'Message',cc:'var(--accent3)',f:'message',d:'New message created'},
    {n:'message_update',c:'Message',cc:'var(--accent3)',f:'message, assistantMessageEvent',d:'Streaming delta (assistant only)'},
    {n:'message_end',c:'Message',cc:'var(--accent3)',f:'message',d:'Message finalized'},
    {n:'tool_execution_start',c:'Tool',cc:'var(--pink)',f:'toolCallId, toolName, args',d:'Tool begins'},
    {n:'tool_execution_update',c:'Tool',cc:'var(--pink)',f:'toolCallId, toolName, partialResult',d:'Partial tool output'},
    {n:'tool_execution_end',c:'Tool',cc:'var(--pink)',f:'toolCallId, toolName, result, isError',d:'Tool finishes'}
  ],subEvents:{t:'AssistantMessageEvent (inside message_update)',f:[{n:'text_start/delta/end',t:'contentIndex, delta',d:'Text streaming'},{n:'thinking_start/delta/end',t:'contentIndex, delta',d:'Thinking streaming'},{n:'toolcall_start/delta/end',t:'contentIndex, delta/toolCall',d:'Tool call streaming'},{n:'done',t:'reason: stop|length|toolUse',d:'Streaming complete'},{n:'error',t:'reason: aborted|error',d:'Streaming error'}]},conn:{t:'Message Types',x:'AgentMessage = UserMessage | AssistantMessage | ToolResultMessage | BashExecutionMessage | CustomMessage | BranchSummaryMessage | CompactionSummaryMessage (7 roles)'}},
  { id:'state',icon:'🔍',title:'State',color:'var(--accent2)',desc:'Session state snapshot',stats:{v:1,l:'method'},apis:[
    {m:'getState',p:'()',r:'Promise<RpcSessionState>',d:'Complete session state snapshot',tags:['rr']}
  ],opts:{t:'RpcSessionState',f:[{n:'model',t:'Model?',d:'Current model'},{n:'thinkingLevel',t:'ThinkingLevel',d:'off|minimal|low|medium|high|xhigh'},{n:'isStreaming',t:'boolean',d:'Agent streaming'},{n:'isCompacting',t:'boolean',d:'Compaction in progress'},{n:'steeringMode',t:'"all"|"one-at-a-time"',d:'Steering mode'},{n:'followUpMode',t:'"all"|"one-at-a-time"',d:'Follow-up mode'},{n:'sessionFile',t:'string?',d:'Session file path'},{n:'sessionId',t:'string',d:'Unique ID'},{n:'sessionName',t:'string?',d:'Display name'},{n:'autoCompactionEnabled',t:'boolean',d:'Auto-compaction'},{n:'messageCount',t:'number',d:'Total messages'},{n:'pendingMessageCount',t:'number',d:'Pending messages'}]}},
  { id:'model',icon:'🧠',title:'Model',color:'var(--pink)',desc:'Switch models, thinking levels',stats:{v:5,l:'methods'},apis:[
    {m:'setModel',p:'(provider, modelId)',r:'Promise<{provider,id}>',d:'Set active model'},
    {m:'cycleModel',p:'()',r:'Promise<{model,thinkingLevel,isScoped}|null>',d:'Cycle to next model'},
    {m:'getAvailableModels',p:'()',r:'Promise<ModelInfo[]>',d:'List all available models'},
    {m:'setThinkingLevel',p:'(level)',r:'Promise<void>',d:'Set: off|minimal|low|medium|high|xhigh'},
    {m:'cycleThinkingLevel',p:'()',r:'Promise<{level}|null>',d:'Cycle thinking level'}
  ],opts:{t:'ModelInfo',f:[{n:'provider',t:'string',d:'Provider name'},{n:'id',t:'string',d:'Model ID'},{n:'contextWindow',t:'number',d:'Max tokens'},{n:'reasoning',t:'boolean',d:'Supports reasoning'}]}},
  { id:'queue',icon:'📋',title:'Queue',color:'var(--orange)',desc:'Steering & follow-up queues',stats:{v:4,l:'methods'},apis:[
    {m:'setSteeringMode',p:'(mode)',r:'Promise<void>',d:'"all" or "one-at-a-time"'},
    {m:'setFollowUpMode',p:'(mode)',r:'Promise<void>',d:'"all" or "one-at-a-time"'},
    {m:'getQueue',p:'()',r:'Promise<{steering[],followUp[]}>',d:'Current queued messages'},
    {m:'clearQueue',p:'()',r:'Promise<{steering[],followUp[]}>',d:'Clear queues'}
  ]},
  { id:'session',icon:'📁',title:'Session',color:'var(--cyan)',desc:'Create/switch/fork/clone/navigate',stats:{v:10,l:'methods'},apis:[
    {m:'newSession',p:'(parentSession?)',r:'Promise<{cancelled}>',d:'Start new session'},
    {m:'switchSession',p:'(sessionPath)',r:'Promise<{cancelled}>',d:'Switch to session file'},
    {m:'fork',p:'(entryId, opts?)',r:'Promise<{text,cancelled,newSessionFile?,newSessionId?}>',d:'Fork from message'},
    {m:'navigateTree',p:'(targetId, opts?)',r:'Promise<{cancelled}>',d:'Navigate to tree node'},
    {m:'clone',p:'()',r:'Promise<{cancelled}>',d:'Clone current branch'},
    {m:'setSessionName',p:'(name)',r:'Promise<void>',d:'Set display name'},
    {m:'getSessionStats',p:'()',r:'Promise<SessionStats>',d:'Get statistics'},
    {m:'exportHtml',p:'(outputPath?)',r:'Promise<{path}>',d:'Export to HTML'},
    {m:'getForkMessages',p:'()',r:'Promise<Array<{entryId,text}>>',d:'Messages available for forking'},
    {m:'getLastAssistantText',p:'()',r:'Promise<string|null>',d:'Last assistant text'}
  ],opts:{t:'SessionStats',f:[{n:'sessionFile/sessionId',t:'string',d:'Session identity'},{n:'userMessages/assistantMessages',t:'number',d:'Message counts'},{n:'toolCalls/toolResults',t:'number',d:'Tool counts'},{n:'totalMessages',t:'number',d:'Total'},{n:'tokens',t:'{input,output,cacheRead,cacheWrite,total}',d:'Token usage'},{n:'cost',t:'number',d:'Total cost'},{n:'contextUsage',t:'ContextUsage?',d:'Window usage'}]}},
  { id:'messages',icon:'📨',title:'Messages',color:'var(--accent3)',desc:'Messages and tree',stats:{v:3,l:'methods'},apis:[
    {m:'getMessages',p:'()',r:'Promise<AgentMessage[]>',d:'All messages in session'},

    h += `<div class="nav-item" data-tab="api" data-section="${s.id}"><div class="nav-dot" style="background:${s.color}"></div><span class="nav-label">${s.icon} ${s.title}</span><span class="nav-count">${s.stats.v}</span></div>`;
  });
  h += '<div class="nav-group-label" style="margin-top:8px">Lifecycles</div>';
  LIFECYCLES.forEach(l => {
    h += `<div class="nav-item" data-tab="lifecycle" data-section="${l.id}"><div class="nav-dot" style="background:${l.color}"></div><span class="nav-label">${l.icon} ${l.title}</span></div>`;
  });
  h += '<div class="nav-group-label" style="margin-top:8px">Use Cases</div>';
  USECASES.forEach(u => {
    h += `<div class="nav-item" data-tab="usecases" data-section="uc-${u.num}"><div class="nav-dot" style="background:${u.color}"></div><span class="nav-label">${u.title}</span></div>`;
  });
  nav.innerHTML = h;
  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      const tab = el.dataset.tab;
      switchTab(tab);
      setTimeout(() => {
        document.getElementById(el.dataset.section)?.scrollIntoView({behavior:'smooth',block:'start'});
      }, 50);
    });
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
}

function buildOverview() {
  document.getElementById('overview-grid').innerHTML = SECTIONS.map(s =>
    `<div class="stat-card" onclick="document.getElementById('${s.id}')?.scrollIntoView({behavior:'smooth'})"><div class="stat-value" style="color:${s.color}">${s.icon} ${s.stats.v}</div><div class="stat-label">${s.title}</div></div>`
  ).join('');
}

function buildApiSections() {
  const c = document.getElementById('api-sections');
  c.innerHTML = SECTIONS.map(s => {
    let h = `<div class="detail-section" id="${s.id}" data-title="${s.title}">`;
    h += `<div class="section-header"><div class="section-icon" style="background:${s.color}20;color:${s.color}">${s.icon}</div><div><div class="section-title">${s.title}</div><div class="section-desc">${s.desc}</div></div></div>`;
    if (s.intro) h += `<div class="intro-box">${s.intro}</div>`;
    if (s.opts && !s.types) h += typeTable(s.opts.t, s.opts.f, s.color);
    if (s.apis) s.apis.forEach(a => {
      h += `<div class="api-card" data-api="${a.m}"><div class="api-card-header" onclick="this.parentElement.classList.toggle('open')"><span class="api-method">${a.m}</span><span class="api-params">${a.p}</span>${a.r ? `<span class="api-return">${a.r}</span>` : ''}</div><div class="api-card-body"><div class="api-desc">${a.d}</div>`;
      if (a.tags) h += `<div style="margin-bottom:8px;display:flex;gap:6px">${a.tags.map(t => `<span class="tag tag-${t==='async'?'async':t==='sub'?'sub':t==='helper'?'ff':'rr'}">${t}</span>`).join('')}</div>`;
      if (a.flow) h += `<div class="flow-box">${a.flow}</div>`;
      h += `</div></div>`;
    });
    if (s.events) {
      h += `<table class="type-table"><thead><tr><th>Name</th><th>Cat</th><th>Fields</th><th>Description</th></tr></thead><tbody>`;
      s.events.forEach(e => h += `<tr><td class="en">${e.n}</td><td><span style="background:${e.cc}20;color:${e.cc};padding:1px 6px;border-radius:3px;font-size:10px">${e.c}</span></td><td style="font-size:11px">${e.f}</td><td class="fd">${e.d}</td></tr>`);
      h += `</tbody></table>`;
    }
    if (s.types) s.types.forEach(t => h += typeTable(t.t, t.f, s.color));
    if (s.subEvents) h += typeTable(s.subEvents.t, s.subEvents.f, s.color);
    if (s.respTypes) h += typeTable(s.respTypes.t, s.respTypes.f, s.color);
    if (s.flow) h += `<div class="flow-box">${s.flow}</div>`;
    if (s.conn) h += `<div class="conn-box"><div class="conn-title">↔ ${s.conn.t}</div><div class="conn-text">${s.conn.x}</div></div>`;
    h += `</div>`;
    return h;
  }).join('');
}

function typeTable(title, fields, color) {
  return `<div style="margin:12px 0"><div style="font-size:13px;font-weight:600;color:${color};margin-bottom:8px">${title}</div><table class="type-table"><thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead><tbody>${fields.map(f => `<tr><td class="fn">${f.n}</td><td class="ft">${f.t}</td><td class="fd">${f.d}</td></tr>`).join('')}</tbody></table></div>`;
}

function buildLifecycles() {
  const c = document.getElementById('lifecycle-content');
  c.innerHTML = LIFECYCLES.map(lc => {
    let h = `<div class="detail-section" id="${lc.id}">`;
    h += `<div class="section-header"><div class="section-icon" style="background:${lc.color}20;color:${lc.color}">${lc.icon}</div><div><div class="section-title">${lc.title}</div><div class="section-desc">${lc.desc}</div></div></div>`;
    if (lc.intro) h += `<div class="intro-box">${lc.intro}</div>`;

    // State machine
    if (lc.machine) {
      const m = lc.machine;
      h += `<div class="lc-diagram"><div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px">`;
      m.states.forEach(s => {
        h += `<div style="flex:1;min-width:140px;padding:12px 14px;border-radius:8px;background:${s.color}20;border:2px solid ${s.color}50"><div style="font-size:12px;font-weight:700;color:${s.color}">${s.name}</div><div style="font-size:10px;color:var(--text-dim);margin-top:4px">${s.desc}</div></div>`;
      });
      h += `</div><table class="type-table"><thead><tr><th>From</th><th>→</th><th>To</th><th>Trigger</th><th>Condition</th></tr></thead><tbody>`;
      m.transitions.forEach(t => {
        const fromC = m.states.find(s=>s.id===t.from)?.color||'var(--text)';
        const toC = m.states.find(s=>s.id===t.to)?.color||'var(--text)';
        h += `<tr><td style="color:${fromC};font-weight:600">${t.from.toUpperCase()}</td><td style="color:var(--text-dim)">→</td><td style="color:${toC};font-weight:600">${t.to.toUpperCase()}</td><td class="fn">${t.label}</td><td class="fd">${t.trigger}</td></tr>`;
      });
      h += `</tbody></table></div>`;
    }

    // States grid
    if (lc.states) {
      h += `<div class="sm-row" style="margin-bottom:16px">`;
      lc.states.forEach(s => {
        h += `<div class="sm-state"><div class="sm-state-title"><div class="sm-state-dot" style="background:${s.color}"></div><span style="color:${s.color}">${s.name}</span></div><div class="sm-state-body">${s.desc}</div><div class="sm-trans">${s.trans}</div></div>`;
      });
      h += `</div>`;
    }

    // Transition table
    if (lc.flow) {
      h += `<table class="type-table"><thead><tr><th>From</th><th>→</th><th>To</th><th>Method</th><th>Internal Flow</th></tr></thead><tbody>`;
      lc.flow.forEach(f => {
        h += `<tr><td style="font-weight:600;color:var(--accent)">${f.from}</td><td style="color:var(--text-dim)">→</td><td style="font-weight:600;color:var(--green)">${f.to}</td><td class="fn">${f.label}</td><td class="fd">${f.via}</td></tr>`;
      });
      h += `</tbody></table>`;
    }

    // Entry types
    if (lc.entryTypes) {
      h += `<div style="margin:12px 0"><div style="font-size:13px;font-weight:600;color:${lc.color};margin-bottom:8px">Entry Types (8)</div><table class="type-table"><thead><tr><th>Type</th><th>Description</th></tr></thead><tbody>`;
      lc.entryTypes.forEach(e => h += `<tr><td class="fn">${e.type}</td><td class="fd">${e.desc}</td></tr>`);
      h += `</tbody></table></div>`;
    }

    // Operations
    if (lc.operations) {
      h += `<div style="margin:12px 0"><div style="font-size:13px;font-weight:600;color:${lc.color};margin-bottom:8px">Tree Operations</div>`;
      lc.operations.forEach(op => {
        h += `<div class="api-card"><div class="api-card-header" onclick="this.parentElement.classList.toggle('open')"><span class="api-method">${op.name}</span><span class="api-return">tree op</span></div><div class="api-card-body"><div class="api-desc">${op.desc}</div></div></div>`;
      });
      h += `</div>`;
    }

    // Phases (vertical steps)
    if (lc.phases) {
      lc.phases.forEach(phase => {
        h += `<div style="margin:16px 0"><div style="font-size:13px;font-weight:700;color:${phase.color};margin-bottom:10px;padding:6px 12px;background:${phase.color}15;border-radius:6px;display:inline-block">${phase.name}</div>`;
        phase.steps.forEach((step, i) => {
          h += `<div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start"><div style="width:20px;height:20px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:${phase.color};flex-shrink:0;border:1px solid var(--border)">${i+1}</div><div style="font-size:11px;color:var(--text-dim);line-height:1.5;padding-top:2px">${step}</div></div>`;
        });
        h += `</div>`;
      });
    }

    // Steps (horizontal tool call)
    if (lc.steps) {
      h += `<div class="lc-diagram"><div style="display:flex;flex-wrap:wrap;gap:10px">`;
      lc.steps.forEach((step, i) => {
        h += `<div style="flex:1;min-width:140px;padding:12px;border-radius:8px;background:${step.color}15;border:1px solid ${step.color}40;text-align:center"><div style="font-size:10px;font-weight:600;color:${step.color};margin-bottom:4px">${step.phase}</div><div style="font-size:9px;color:var(--text-dim)">${step.desc}</div></div>`;
        if (i < lc.steps.length - 1) h += `<div style="display:flex;align-items:center;color:var(--text-dim);font-size:16px">→</div>`;
      });
      h += `</div></div>`;
    }

    h += `</div>`;
    return h;
  }).join('');
}

function buildUsecases() {
  const c = document.getElementById('usecases-content');
  c.innerHTML = `<div style="margin-bottom:24px"><div class="overview-title">Use Cases</div><div class="overview-sub">Practical examples showing RPC Client lifecycle patterns in action</div></div>` + USECASES.map(uc => {
    let h = `<div class="uc-card" id="uc-${uc.num}"><div class="uc-header"><div class="uc-num" style="background:${uc.color}20;color:${uc.color}">${uc.num}</div><div class="uc-title">${uc.title}</div></div><div class="uc-body">`;
    uc.steps.forEach((step, i) => {
      h += `<div class="uc-step"><div class="uc-step-num">${i+1}</div><div class="uc-step-content"><div class="uc-step-title">${step.t}</div><div class="uc-step-desc">${step.d}</div>`;
      if (step.code) h += `<div class="uc-code">${step.code}</div>`;
      h += `</div></div>`;
    });
    h += `</div></div>`;
    return h;
  }).join('');
}

// ┌─────────────────────────────────────────────┐
// │  INTERACTIVITY                              │
// └─────────────────────────────────────────────┘
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

function setupScrollSpy() {
  const main = document.getElementById('main');
  const items = document.querySelectorAll('.nav-item');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        items.forEach(i => i.classList.remove('active'));
        const itemsForSection = document.querySelectorAll(`.nav-item[data-section="${entry.target.id}"]`);
        if (itemsForSection.length) itemsForSection[0].classList.add('active');
      }
    });
  }, {root: main, threshold: 0.15, rootMargin: '0px 0px -60% 0px'});
  document.querySelectorAll('.detail-section').forEach(s => observer.observe(s));
}

function setupSearch() {
  document.getElementById('search-box').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    switchTab('api');
    document.querySelectorAll('#api-sections .detail-section').forEach(sec => {
      if (!q) { sec.classList.remove('hidden'); return; }
      sec.classList.toggle('hidden', !sec.textContent.toLowerCase().includes(q));
    });
    if (q) {
      document.querySelectorAll('.api-card').forEach(card => {
        if (card.textContent.toLowerCase().includes(q)) {
          card.classList.add('open');
          card.closest('.detail-section')?.classList.remove('hidden');
        }
      });
    }
  });
}

// ┌─────────────────────────────────────────────┐
// │  INIT                                       │
// └─────────────────────────────────────────────┘
buildSidebar();
buildOverview();
buildApiSections();
buildLifecycles();
buildUsecases();
setupTabs();
setupScrollSpy();
setupSearch();
</script>
</body>
</html>
