name: Publish Packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@dyyz1993"

      - name: Install dependencies
        run: |
          npm install --ignore-scripts

      - name: Create jiti workaround - symlink @mariozechner to @dyyz1993
        run: |
          mkdir -p node_modules/@mariozechner
          for pkg in pi-agent-core pi-ai pi-tui pi-coding-agent pi-mom pi-pods pi-web-ui pi; do
            rm -rf "node_modules/@mariozechner/$pkg"
            ln -sf "../@dyyz1993/$pkg" "node_modules/@mariozechner/$pkg"
          done

      - name: Build packages
        run: |
          npm run build

      - name: Pack packages
        run: |
          mkdir -p dist
          npm pack --pack-destination=dist --workspace=packages/tui
          npm pack --pack-destination=dist --workspace=packages/agent
          npm pack --pack-destination=dist --workspace=packages/ai
          npm pack --pack-destination=dist --workspace=packages/coding-agent
          npm pack --pack-destination=dist --workspace=packages/mom
          npm pack --pack-destination=dist --workspace=packages/web-ui
          npm pack --pack-destination=dist --workspace=packages/pods
          ls -la dist/

      - name: Configure git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/" && git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/" && git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Publish tarballs to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for tarball in dist/*.tgz; do
            echo "Publishing $tarball..."
            npm publish "$tarball" --access public
          done
