name: Publish Packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@dyyz1993"

      - name: Install dependencies
        run: |
          npm install --ignore-scripts

      - name: Create jiti workaround - symlink @mariozechner to @dyyz1993
        run: |
          mkdir -p node_modules/@mariozechner
          for pkg in pi-agent-core pi-ai pi-tui pi-coding-agent pi-mom pi-pods pi-web-ui pi; do
            rm -rf "node_modules/@mariozechner/$pkg"
            ln -sf "../@dyyz1993/$pkg" "node_modules/@mariozechner/$pkg"
          done

      - name: Build packages
        run: |
          npm run build

      - name: Publish packages to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish packages/tui --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          npm publish packages/agent --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          npm publish packages/ai --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          npm publish packages/coding-agent --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          npm publish packages/mom --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          npm publish packages/web-ui --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          npm publish packages/pods --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
