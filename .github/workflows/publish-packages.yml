name: Publish Packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@dyyz1993"

      - name: Install dependencies
        run: |
          npm install --ignore-scripts

      - name: Create jiti workaround for @mariozechner -> @dyyz1993 symlinks
        run: |
          mkdir -p node_modules/@mariozechner
          for pkg in pi-agent-core pi-ai pi-tui pi-coding-agent pi-mom pi-pods pi-web-ui; do
            ln -sf ../@dyyz1993/$pkg node_modules/@mariozechner/$pkg 2>/dev/null || true
          done
          ls -la node_modules/@mariozechner/

      - name: Debug TypeScript types
        run: |
          echo "=== Node version ==="
          node -v
          echo "=== @types/node ==="
          ls node_modules/@types/node/ | head -5
          echo "=== @typescript/native-preview ==="
          ls node_modules/@typescript/native-preview-*/lib/ 2>/dev/null | head -10
          echo "=== Check Response type in native-preview ==="
          grep -l "interface Response" node_modules/@typescript/native-preview-*/lib/*.d.ts 2>/dev/null

      - name: Build packages
        run: |
          npm run build

      - name: Publish packages to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"

          cd packages/tui && npm publish --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          cd ../agent && npm publish --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          cd ../ai && npm publish --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          cd ../coding-agent && npm publish --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          cd ../mom && npm publish --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          cd ../web-ui && npm publish --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
          cd ../pods && npm publish --access public --otp "${NPM_TOKEN}" --repository-url "https://github.com/dyyz1993/pi-mono"
