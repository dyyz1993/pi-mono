<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷电战机</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
        }
        
        .game-container {
            position: relative;
            border: 3px solid #00ffff;
            border-radius: 8px;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.5),
                inset 0 0 60px rgba(0, 255, 255, 0.1);
        }
        
        canvas {
            display: block;
            background: linear-gradient(180deg, #000022 0%, #000044 100%);
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        
        .score, .high-score {
            color: #00ffff;
            font-size: 18px;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .high-score {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 20, 0.9);
            z-index: 10;
        }
        
        .hidden {
            display: none !important;
        }
        
        h1 {
            font-size: 48px;
            color: #00ffff;
            text-shadow: 
                0 0 20px #00ffff,
                0 0 40px #00ffff;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }
        
        .game-over-screen h1 {
            color: #ff3366;
            text-shadow: 
                0 0 20px #ff3366,
                0 0 40px #ff3366;
        }
        
        .final-score {
            font-size: 24px;
            color: #ffff00;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 50px;
            font-size: 20px;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(180deg, #00ffff 0%, #0088aa 100%);
            border: none;
            border-radius: 5px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #00ffff;
        }
        
        .instructions {
            color: #888;
            margin-top: 30px;
            font-size: 14px;
        }
        
        .instructions span {
            color: #00ffff;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="480" height="700"></canvas>
        
        <div class="ui-overlay">
            <div class="score">得分: <span id="scoreDisplay">0</span></div>
            <div class="high-score">最高分: <span id="highScoreDisplay">0</span></div>
        </div>
        
        <div class="start-screen" id="startScreen">
            <h1>雷电战机</h1>
            <button class="btn" id="startBtn">开始游戏</button>
            <p class="instructions">
                <span>← →</span> 或 <span>A D</span> 移动 | <span>空格</span> 暂停
            </p>
        </div>
        
        <div class="game-over-screen hidden" id="gameOverScreen">
            <h1>游戏结束</h1>
            <p class="final-score">最终得分: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('planeGameHighScore')) || 0;
        let difficulty = 1;
        let frameCount = 0;
        
        // 更新最高分显示
        document.getElementById('highScoreDisplay').textContent = highScore;
        
        // 玩家飞机
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 80,
            width: 40,
            height: 50,
            speed: 6,
            bullets: [],
            lastShot: 0,
            shootDelay: 150,
            alive: true
        };
        
        // 敌机数组
        let enemies = [];
        
        // 粒子效果
        let particles = [];
        
        // 星星背景
        let stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5
            });
        }
        
        // 按键状态
        const keys = {
            left: false,
            right: false,
            space: false
        };
        
        // 事件监听
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ') {
                keys.space = true;
                if (gameRunning) {
                    gameRunning = false;
                    document.querySelector('.start-screen').classList.remove('hidden');
                    document.querySelector('.start-screen h1').textContent = '游戏暂停';
                    document.getElementById('startBtn').textContent = '继续';
                }
            }
            e.preventDefault();
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === ' ') keys.space = false;
        });
        
        // 开始游戏按钮
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        function startGame() {
            // 重置游戏状态
            player.x = canvas.width / 2;
            player.y = canvas.height - 80;
            player.bullets = [];
            player.alive = true;
            enemies = [];
            particles = [];
            score = 0;
            difficulty = 1;
            frameCount = 0;
            gameRunning = true;
            
            document.getElementById('scoreDisplay').textContent = '0';
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
        }
        
        function gameOver() {
            gameRunning = false;
            player.alive = false;
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('planeGameHighScore', highScore);
                document.getElementById('highScoreDisplay').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        // 绘制玩家飞机
        function drawPlayer() {
            if (!player.alive) return;
            
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // 机身
            ctx.fillStyle = '#00ccff';
            ctx.beginPath();
            ctx.moveTo(0, -player.height / 2);
            ctx.lineTo(player.width / 2, player.height / 2);
            ctx.lineTo(0, player.height / 3);
            ctx.lineTo(-player.width / 2, player.height / 2);
            ctx.closePath();
            ctx.fill();
            
            // 驾驶舱
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.ellipse(0, -5, 8, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 引擎火焰
            const flameLength = 10 + Math.random() * 10;
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(-5, player.height / 3);
            ctx.lineTo(0, player.height / 3 + flameLength);
            ctx.lineTo(5, player.height / 3);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.moveTo(-3, player.height / 3);
            ctx.lineTo(0, player.height / 3 + flameLength * 0.6);
            ctx.lineTo(3, player.height / 3);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }
        
        // 绘制子弹
        function drawBullets() {
            player.bullets.forEach(bullet => {
                ctx.save();
                ctx.translate(bullet.x, bullet.y);
                
                // 子弹发光效果
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ff00';
                
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(-3, -10, 6, 20);
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-1.5, -8, 3, 12);
                
                ctx.restore();
            });
        }
        
        // 绘制敌机
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                
                // 敌机机身
                ctx.fillStyle = enemy.color || '#ff4444';
                ctx.beginPath();
                ctx.moveTo(0, enemy.height / 2);
                ctx.lineTo(enemy.width / 2, -enemy.height / 2);
                ctx.lineTo(0, -enemy.height / 3);
                ctx.lineTo(-enemy.width / 2, -enemy.height / 2);
                ctx.closePath();
                ctx.fill();
                
                // 敌机发光
                ctx.shadowBlur = 15;
                ctx.shadowColor = enemy.color || '#ff4444';
                ctx.fill();
                
                // 驾驶舱
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.ellipse(0, 0, 6, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // 绘制星星背景
        function drawStars() {
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.3})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // 创建爆炸粒子
        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 4 + 2,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.02,
                    color: color || '#ff6600'
                });
            }
        }
        
        // 敌机类
        function createEnemy() {
            const types = [
                { width: 35, height: 45, speed: 2, hp: 1, color: '#ff4444', score: 10 },
                { width: 45, height: 55, speed: 1.5, hp: 2, color: '#ff8800', score: 20 },
                { width: 55, height: 65, speed: 1, hp: 3, color: '#ff00ff', score: 30 }
            ];
            
            // 根据难度选择敌机类型
            let typeIndex = 0;
            if (difficulty > 5) {
                typeIndex = Math.random() < 0.3 ? 1 : 0;
            }
            if (difficulty > 10) {
                typeIndex = Math.random() < 0.2 ? 2 : (Math.random() < 0.5 ? 1 : 0);
            }
            
            const type = types[typeIndex];
            
            return {
                x: Math.random() * (canvas.width - type.width) + type.width / 2,
                y: -type.height,
                width: type.width,
                height: type.height,
                speed: type.speed + difficulty * 0.1,
                hp: type.hp,
                maxHp: type.hp,
                color: type.color,
                score: type.score
            };
        }
        
        // 更新游戏
        function update() {
            if (!gameRunning || !player.alive) return;
            
            frameCount++;
            
            // 增加难度
            difficulty = 1 + Math.floor(score / 50);
            
            // 玩家移动
            if (keys.left && player.x > player.width / 2) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - player.width / 2) {
                player.x += player.speed;
            }
            
            // 玩家射击
            const now = Date.now();
            if (now - player.lastShot > player.shootDelay) {
                player.bullets.push({
                    x: player.x,
                    y: player.y - player.height / 2
                });
                player.lastShot = now;
            }
            
            // 更新子弹
            player.bullets = player.bullets.filter(bullet => {
                bullet.y -= 10;
                return bullet.y > -20;
            });
            
            // 生成敌机
            const spawnRate = Math.max(30, 80 - difficulty * 5);
            if (frameCount % spawnRate === 0) {
                enemies.push(createEnemy());
            }
            
            // 更新敌机
            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;
                return enemy.y < canvas.height + enemy.height;
            });
            
            // 碰撞检测 - 子弹击中敌机
            player.bullets.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    if (bullet.x > enemy.x - enemy.width / 2 &&
                        bullet.x < enemy.x + enemy.width / 2 &&
                        bullet.y > enemy.y - enemy.height / 2 &&
                        bullet.y < enemy.y + enemy.height / 2) {
                        
                        // 移除子弹
                        player.bullets.splice(bi, 1);
                        
                        // 敌机受伤
                        enemy.hp--;
                        
                        // 创建击中火花
                        createExplosion(bullet.x, bullet.y, '#ffff00');
                        
                        if (enemy.hp <= 0) {
                            // 敌机爆炸
                            createExplosion(enemy.x, enemy.y, enemy.color);
                            score += enemy.score;
                            document.getElementById('scoreDisplay').textContent = score;
                            
                            // 移除敌机
                            enemies.splice(ei, 1);
                        }
                    }
                });
            });
            
            // 碰撞检测 - 敌机撞到玩家
            enemies.forEach(enemy => {
                if (player.x > enemy.x - enemy.width / 2 - 10 &&
                    player.x < enemy.x + enemy.width / 2 + 10 &&
                    player.y > enemy.y - enemy.height / 2 - 10 &&
                    player.y < enemy.y + enemy.height / 2 + 10) {
                    createExplosion(player.x, player.y, '#00ffff');
                    gameOver();
                }
            });
            
            // 更新粒子
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                p.vy += 0.1; // 重力
                return p.life > 0;
            });
            
            // 更新星星
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }
        
        // 渲染游戏
        function render() {
            // 清空画布
            ctx.fillStyle = '#000022';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制星星
            drawStars();
            
            // 绘制粒子
            drawParticles();
            
            // 绘制子弹
            drawBullets();
            
            // 绘制敌机
            drawEnemies();
            
            // 绘制玩家
            drawPlayer();
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        // 启动游戏循环
        gameLoop();
    </script>
</body>
</html>
